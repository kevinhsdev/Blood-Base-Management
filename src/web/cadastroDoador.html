<html>
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Doadores</title>
    <link rel="stylesheet" href="style/cadastroDoador.css">
</head>
<body>
    
    
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="img/logo.png" alt="Logo CHAPS" class="logo-img" />
      <div class="logo-text">
        <span class="logo-name">CHAPS</span>
        <span class="logo-sub">Hemocentro</span>
      </div>
    </div>
 
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">Página Inicial</a>
      <a href="cadastroDoador.html" class="nav-item active">Cadastro de Doador</a>
      <a href="registroDoacao.html" class="nav-item">Registro de Doação</a>
      <a href="estoque.html" class="nav-item">Estoque</a>
      <a href="compatibilidade.html" class="nav-item">Teste de Compatibilidade</a>
    </nav>
  </aside>
 
  <!-- MAIN CONTENT -->
  <main class="main-content">
    <header class="topbar">
      <span>Cadastro de Doador</span>
    </header>
 
    <div class="page-body">
 
      <!-- CARD: Formulário -->
      <div class="card form-card">
        <h2 class="card-title">Dados do Doador</h2>
 
        <div class="form-group">
          <label for="nome">Nome:</label>
          <input type="text" id="nome" name="nome" />
        </div>
 
        <div class="form-group">
          <label for="idade">Idade:</label>
          <input type="text" id="idade" name="idade" />
        </div>
 
        <div class="form-group">
          <label for="telefone">Telefone:</label>
          <input type="tel" id="telefone" name="telefone" />
        </div>
 
        <div class="form-group">
          <label for="tipo">Tipo Sanguíneo:</label>
          <input type="text" id="tipo" name="tipo" />
        </div>
 
        <div class="form-group">
          <label for="peso">Peso (kg):</label>
          <input type="text" id="peso" name="peso" />
        </div>
 
        <div class="btn-row">
          <button class="btn btn-green">Cadastrar</button>
          <button class="btn btn-blue">Atualizar</button>
          <button class="btn btn-red">Deletar</button>
        </div>
 
        <div class="btn-row-center">
          <button class="btn btn-gray">Consultar Todos</button>
        </div>
      </div>
 
      <!-- CARD: Lista de Doadores -->
      <div class="card list-card">
        <h2 class="card-title">Lista de Doadores</h2>
 
        <div class="search-row">
          <input type="text" id="searchId" placeholder="Consultar pelo ID" class="search-input" />
          <button class="btn btn-search">🔍</button>
        </div>
 
        <!-- Tabela será populada via banco de dados -->
        <div class="table-wrapper" id="tabelaDoadores">
          <!-- Exemplo da estrutura da tabela que virá do banco:
 
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Idade</th>
                <th>Telefone</th>
                <th>Tipo Sanguíneo</th>
                <th>Peso (kg)</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>João Silva</td>
                <td>28</td>
                <td>(11) 99999-0000</td>
                <td>O+</td>
                <td>75</td>
              </tr>
            </tbody>
          </table>
 
          -->
        </div>
      </div>
 
    </div>
  </main>

</body>
</html>
